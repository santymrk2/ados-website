name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ==========================================
  # CI: Lint, Build, Test
  # ==========================================
  ci:
    name: CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ados
          POSTGRES_PASSWORD: ados_password
          POSTGRES_DB: ados
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Build application
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Push database schema
        env:
          DATABASE_URL: postgresql://ados:ados_password@localhost:5432/ados
          ADMIN_PASSWORD: admin123
          VIEWER_PASSWORD: viewer123
        run: bun run db:push

      - name: Run Playwright tests
        env:
          DATABASE_URL: postgresql://ados:ados_password@localhost:5432/ados
          ADMIN_PASSWORD: admin123
          VIEWER_PASSWORD: viewer123
        run: |
          bun run dev &
          echo "Waiting for dev server to start (max 45s)..."
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is up!"
              break
            fi
            sleep 1
          done
          curl -f http://localhost:3000 || exit 1
          bunx playwright test
          kill %1 || true

  # ==========================================
  # CD: Docker Build & Push (Producción)
  # Solo en push a main o tags
  # ==========================================
  docker:
    name: Docker Build & Push (Production)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (latest)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push (tagged release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy en Dokploy
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -s -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"

  # ==========================================
  # CD: Docker Build & Push (Staging)
  # Solo en push a develop
  # ==========================================
  staging:
    name: Docker Build & Push (Staging)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (staging)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max