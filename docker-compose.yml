services:
  # PostgreSQL database
  db:
    image: postgres:18-alpine
    container_name: ados-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ados
      POSTGRES_PASSWORD: ados_password
      POSTGRES_DB: ados
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ados -d ados"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js app
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ados-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ados:ados_password@db:5432/ados
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:push && npm run dev"

volumes:
  postgres_data: